version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tolovelist-db
    environment:
      POSTGRES_USER: tolovelist
      POSTGRES_PASSWORD: tolovelist
      POSTGRES_DB: tolovelist
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tolovelist']
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: docker/Dockerfile.server
    container_name: tolovelist-server
    environment:
      NODE_ENV: production
      SERVER_PORT: 4000
      DATABASE_URL: postgresql://tolovelist:tolovelist@postgres:5432/tolovelist?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      AI_PROVIDER: ${AI_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
    ports:
      - '4000:4000'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  client:
    build:
      context: .
      dockerfile: docker/Dockerfile.client
    container_name: tolovelist-client
    ports:
      - '80:80'
    depends_on:
      - server
    restart: unless-stopped

volumes:
  postgres_data:
